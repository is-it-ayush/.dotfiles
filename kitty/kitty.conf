# =============================================================================
# FONTS
# =============================================================================
font_family      JetBrains Mono
# Devanagari fallback — kitty handles this via symbol_map
font_size        12.0

# Allow Devanagari matras/combining marks to overflow the cell
# (mirrors allow_square_glyphs_to_overflow_width)
box_drawing_scale 0.001, 1, 1.5, 2


# =============================================================================
# WINDOW
# =============================================================================
window_padding_width  0
background_opacity    0.8

# Start fullscreen (mirrors gui-startup ToggleFullScreen)
startup_session       none
remember_window_size  no
initial_window_width  100c
initial_window_height 30c
# Actual fullscreen on launch — put this in your startup or use:
# kitty --start-as=fullscreen
# OR set below:
# resize_in_steps no


# =============================================================================
# TABS
# =============================================================================
tab_bar_edge          top
tab_bar_style         powerline

# Ctrl+T — new tab
map ctrl+t        new_tab_with_cwd

# Ctrl+X — close tab
map ctrl+x        close_tab


# =============================================================================
# PANES (SPLITS)
# Leader = Ctrl+Shift+Space, then key
# Kitty doesn't have a native leader, so we use kitty_mod sequences
# =============================================================================

# Ctrl+Shift+Space is kitty's "remote control" prefix — we use kitty @ here
# Instead, map directly since kitty doesn't natively support leader keys.
# Convention: use ctrl+shift as the modifier (clean equivalent)

# Split pane horizontally (leader+h → Ctrl+Shift+H)
map ctrl+shift+h    launch --location=vsplit --cwd=current

# Split pane vertically (leader+v → Ctrl+Shift+V)
map ctrl+shift+v    launch --location=hsplit --cwd=current

# Move between panes (leader+arrows → Ctrl+Shift+Arrows)
map ctrl+shift+left  neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up    neighboring_window up
map ctrl+shift+down  neighboring_window down

# Maximize/zoom pane (leader+m → Ctrl+Shift+M)
map ctrl+shift+m    toggle_layout stack

# Rotate panes clockwise (leader+c → Ctrl+Shift+R)
map ctrl+shift+r    move_window_forward

# Swap pane (leader+p → Ctrl+Shift+P)
map ctrl+shift+p    focus_visible_window


# =============================================================================
# CLIPBOARD
# =============================================================================
# Ctrl+Shift+C — copy (kitty default, kept explicit)
map ctrl+shift+c    copy_to_clipboard

# Ctrl+Shift+V — paste
map ctrl+shift+v    paste_from_clipboard


# =============================================================================
# MISC
# =============================================================================
# Reload config (leader+r → Ctrl+Shift+F5 is kitty default, remapped here)
map ctrl+shift+f5   load_config_file

# Enable remote control for scripting (needed for some advanced layouts)
allow_remote_control yes

# Better complex script shaping
force_ltr no
